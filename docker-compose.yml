services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    command: sh -lc "composer install --no-interaction --prefer-dist && apache2-foreground"
    environment:
      APP_ENV: dev
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: newsdb
      DB_USER: newsuser
      DB_PASSWORD: newspass
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: news_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: newspass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./base_donnee:/docker-entrypoint-initdb.d

volumes:
  pg_data:
